name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller ntfy-tray.spec

    - name: Create installer with Inno Setup
      run: iscc ntfy-tray.iss

    - name: Cleanup generated version files
      run: |
        if (Test-Path version.py) { Remove-Item version.py }
        if (Test-Path version.txt) { Remove-Item version.txt }
      shell: pwsh

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-tray-windows-installer
        path: inno-output/ntfy-tray-installer.exe
        retention-days: 1

    - name: Zip portable build
      run: Compress-Archive -Path dist/ntfy-tray/* -DestinationPath ntfy-tray-windows-portable.zip
      shell: pwsh

    - name: Upload portable
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-tray-windows-portable
        path: ntfy-tray-windows-portable.zip
        retention-days: 1

  build-macos:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-UserNotifications

    - name: Build with PyInstaller
      run: |
        export MACOSX_DEPLOYMENT_TARGET=12.0
        pyinstaller ntfy-tray.spec
        rm -f version.py version.txt

    - name: Import signing certificate
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      run: |
        echo "$MACOS_CERTIFICATE" | base64 --decode > certificate.p12
        security create-keychain -p temp1234 build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p temp1234 build.keychain
        security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
        security set-key-partition-list -S apple-tool:,apple: -s -k temp1234 build.keychain

    - name: Sign app bundle
      run: |
        codesign --deep --force --verify --verbose \
          --sign "Developer ID Application" \
          --options runtime \
          dist/ntfy-tray.app

    - name: Create DMG
      run: |
        mkdir -p dmg-stage
        cp -R dist/ntfy-tray.app dmg-stage/
        ln -s /Applications dmg-stage/Applications
        hdiutil create -volname "ntfy-tray" -srcfolder dmg-stage -ov -format UDZO ntfy-tray-macos-arm64.dmg

    - name: Notarize DMG
      env:
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        xcrun notarytool submit ntfy-tray-macos-arm64.dmg \
          --apple-id "$APPLE_ID" \
          --password "$APPLE_APP_PASSWORD" \
          --team-id "$APPLE_TEAM_ID" \
          --wait
        xcrun stapler staple ntfy-tray-macos-arm64.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-tray-macos-arm64
        path: ntfy-tray-macos-arm64.dmg
        retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        generate_release_notes: true
        files: |
          artifacts/ntfy-tray-windows-installer/ntfy-tray-installer.exe
          artifacts/ntfy-tray-windows-portable/ntfy-tray-windows-portable.zip
          artifacts/ntfy-tray-macos-arm64/ntfy-tray-macos-arm64.dmg
