name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and release (e.g. v1.0)'
        required: true
        type: string

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build with PyInstaller
      run: pyinstaller ntfy-tray.spec

    - name: Create installer with Inno Setup
      run: iscc ntfy-tray.iss

    - name: Upload installer
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-tray-windows-installer
        path: inno-output/ntfy-tray-installer.exe
        retention-days: 1

    - name: Zip portable build
      run: Compress-Archive -Path dist/ntfy-tray/* -DestinationPath ntfy-tray-windows-portable.zip
      shell: pwsh

    - name: Upload portable
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-tray-windows-portable
        path: ntfy-tray-windows-portable.zip
        retention-days: 1

  build-macos:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements.txt
        pip install pyinstaller Pillow pyobjc-core pyobjc-framework-Cocoa

    - name: Build with PyInstaller
      run: |
        export MACOSX_DEPLOYMENT_TARGET=12.0
        pyinstaller ntfy-tray.spec

    - name: Create DMG
      run: |
        mkdir -p dmg-stage
        cp -R dist/ntfy-tray.app dmg-stage/
        ln -s /Applications dmg-stage/Applications
        hdiutil create -volname "ntfy-tray" -srcfolder dmg-stage -ov -format UDZO ntfy-tray-macos-arm64.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: ntfy-tray-macos-arm64
        path: ntfy-tray-macos-arm64.dmg
        retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ inputs.tag }}
        name: ${{ inputs.tag }}
        generate_release_notes: true
        files: |
          artifacts/ntfy-tray-windows-installer/ntfy-tray-installer.exe
          artifacts/ntfy-tray-windows-portable/ntfy-tray-windows-portable.zip
          artifacts/ntfy-tray-macos-arm64/ntfy-tray-macos-arm64.dmg
